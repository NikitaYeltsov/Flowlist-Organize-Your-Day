<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowlist — App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="app.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
</head>

<body class="app-body">

    <header class="topbar">
        <a href="index.html" class="topbar-logo">
            <svg viewBox="0 0 40 40" fill="none" width="28" height="28">
                <polygon points="20,3 36,12 36,28 20,37 4,28 4,12" stroke="currentColor" stroke-width="1.8"
                    fill="none" />
                <path d="M13 20 L17 24 L27 14" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" fill="none" />
            </svg>
            Flow<strong>list</strong>
        </a>
        <div class="topbar-center">
            <span class="breadcrumb-icon">◈</span>
            <span id="breadcrumbTitle">Untitled</span>
        </div>
        <div class="topbar-right">
            <div class="save-indicator" id="saveIndicator"><span class="save-dot"></span> Saved</div>
            <button class="topbar-btn" id="newDocBtn" title="New document">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="12" y1="11" x2="12" y2="17" />
                    <line x1="9" y1="14" x2="15" y2="14" />
                </svg>
                New
            </button>
            <button class="topbar-btn mobile-only" id="sidebarToggle" title="Documents">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
        </div>
    </header>

    <div class="app-layout">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <span class="sidebar-label">Documents</span>
                <button class="sidebar-new-btn" id="sidebarNewBtn">+ New</button>
            </div>
            <ul class="doc-list" id="docList"></ul>
        </aside>

        <main class="editor-area" id="editorArea">

            <div class="editor-toolbar">
                <div class="tb-group">
                    <button class="tb-btn" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
                    <button class="tb-btn" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
                    <button class="tb-btn" data-cmd="underline" title="Underline"><u>U</u></button>
                    <button class="tb-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
                </div>
                <div class="tb-sep"></div>
                <div class="tb-group">
                    <button class="tb-btn" data-heading="h2" title="Heading 2">H2</button>
                    <button class="tb-btn" data-heading="h3" title="Heading 3">H3</button>
                    <button class="tb-btn" data-cmd="formatBlock" data-val="p" title="Normal text">¶</button>
                    <button class="tb-btn" data-cmd="formatBlock" data-val="blockquote" title="Quote">"</button>
                </div>
                <div class="tb-sep"></div>
                <div class="tb-group">
                    <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet list">• —</button>
                    <button class="tb-btn" data-cmd="insertOrderedList" title="Numbered list">1.</button>
                    <button class="tb-btn" id="insertTaskBtn" title="Insert task">☐ Task</button>
                </div>
                <div class="tb-sep"></div>
                <div class="tb-group">
                    <button class="tb-btn" data-cmd="justifyLeft" title="Left">«</button>
                    <button class="tb-btn" data-cmd="justifyCenter" title="Center">≡</button>
                </div>
                <div class="tb-sep tb-push"></div>
                <div class="tb-group">
                    <button class="tb-btn tb-danger" id="clearDocBtn">✕ Clear</button>
                </div>
            </div>

            <div class="editor-scroll">
                <div class="editor-page">

                    <div class="editor-title-row">
                        <div class="editor-doc-icon">◈</div>
                        <input type="text" class="editor-title" id="editorTitle" placeholder="Untitled document…"
                            maxlength="80" autocomplete="off" spellcheck="false" />
                    </div>

                    <div class="editor-meta-row">
                        <span id="metaDate"></span>
                        <span class="meta-sep">·</span>
                        <span id="metaWords">0 words</span>
                        <span class="meta-sep">·</span>
                        <span id="metaTasks">0 tasks</span>
                    </div>

                    <div class="editor-body" id="editorBody" contenteditable="true" spellcheck="true"
                        data-placeholder="Start writing here…&#10;&#10;Use the toolbar to format text, add headings, bullet lists, or task checkboxes.">
                    </div>

                </div>
            </div>

            <div class="quick-task-bar">
                <span class="qtb-label">☐</span>
                <input type="text" id="quickTaskInput" class="qtb-input" placeholder="Quick-add a task…"
                    maxlength="120" />
                <button class="qtb-btn" id="quickTaskBtn">Add</button>
            </div>

        </main>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="confetti-layer" id="confettiLayer"></div>

    <script src="nav.js"></script>
    <script src="app.js"></script>
</body>

</html>
